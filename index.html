<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>nothing.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ================= LANDING ================= -->

<section id="landing" class="page active">

    <div class="overlay"></div>

    <div class="center">

        <h1>

            nothing.<br>

            i was bored.

        </h1>

        <button id="startBtn">

            i have a question for u

        </button>

    </div>

</section>





<!-- ================= PICTURES ================= -->

<section id="pictures" class="page">

    <div class="wrapper">

        <h2>

            pick one.

        </h2>

        <div class="gallery">

            <img src="images/pictures/pic1.jpg" class="picture">

            <img src="images/pictures/pic2.jpg" class="picture">

            <img src="images/pictures/pic3.jpg" class="picture">

            <img src="images/pictures/pic4.jpg" class="picture">

        </div>

    </div>

</section>





<!-- ================= POPUP ================= -->

<div id="popup">

    <div class="popup-card">

        <h3>

            no one cares.

        </h3>

        <button id="continueBtn">

            continue

        </button>

    </div>

</div>





<!-- ================= LOVE ================= -->

<section id="love" class="page">

    <div class="wrapper">

        <h2>

            do u love me?

        </h2>

        <div class="loveButtons">

            <button id="yesBtn">

                yes 🤍

            </button>

            <button id="noBtn">

                no 💀

            </button>

        </div>

    </div>

</section>





<!-- ================= FLOWERS ================= -->

<section id="flowers" class="page">

    <div class="wrapper">

        <h2>

            pick one again.

        </h2>

        <div class="flowerGrid">

            <div class="flowerCard" id="roseCard">

                <img src="images/flowers/rose.png">

                <p>Rose</p>

            </div>

            <div class="flowerCard" id="sunflowerCard">

                <img src="images/flowers/sunflower.png">

                <p>Sunflower</p>

            </div>

            <div class="flowerCard" id="daisyCard">

                <img src="images/flowers/daisy.png">

                <p>Daisy</p>

            </div>

            <div class="flowerCard" id="lilyCard">

                <img src="images/flowers/lily.png">

                <p>Lily</p>

            </div>

        </div>

    </div>

</section>
<!-- ================= FLOWER POPUP ================= -->

<div id="flowerPopup">

    <div class="popup-card">

        <h3>

            no one cares.

        </h3>

        <button id="flowerContinue">

            continue

        </button>

    </div>

</div>





<!-- ================= ENDING ================= -->

<section id="ending" class="page">

    <div id="lilyContainer"></div>

    <div class="wrapper">

        <h1>

            nvm.<br><br>

            u deserve it.

        </h1>

        <button id="lastThing">

            one last thing...

        </button>

    </div>

</section>





<!-- ================= LAST PAGE ================= -->

<section id="last" class="page">

    <div class="wrapper">

        <h1 id="finalText">

            still<br><br>

            no one cares.

        </h1>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
